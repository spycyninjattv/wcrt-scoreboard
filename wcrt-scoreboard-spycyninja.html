<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>WCRT Scoreboard</title>
<style>
  :root{
    --wcrt-blue:#19c5ff;
    --wcrt-orange:#ff7a18;
    --stroke: rgba(255,255,255,0.10);
    --glow-blue: 0 0 18px rgba(25,197,255,0.55), 0 0 40px rgba(25,197,255,0.25);
    --glow-orange: 0 0 18px rgba(255,122,24,0.45), 0 0 40px rgba(255,122,24,0.20);
  }

  html, body{
    width:100%;
    height:100%;
    margin:0;
    background: transparent;
    font-family: Arial, Helvetica, sans-serif;
    color:#fff;
  }
  body{ display:flex; justify-content:center; align-items:center; }

  .container{ width: 980px; padding: 12px 0; }

  .bestof{
    display:flex; justify-content:center; align-items:baseline; gap:14px;
    font-weight:900; letter-spacing:6px; text-transform:uppercase;
    margin-bottom:28px;
    filter: drop-shadow(0 0 10px rgba(25,197,255,0.25));
  }
  .bestof span{
    font-size:44px;
    background: linear-gradient(90deg, var(--wcrt-blue), #ffffff, var(--wcrt-orange));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .bestof .bo{
    width:72px; font-size:44px; font-weight:900; text-align:center;
    border-bottom: 3px solid rgba(255,255,255,0.35);
    padding-bottom:2px;
  }

  .row{
    position:relative;
    display:flex; align-items:center; justify-content:space-between;
    margin: 18px 0; padding: 18px 26px;
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(10,14,24,0.35), rgba(10,14,24,0.18));
    border: 1px solid var(--stroke);
    backdrop-filter: blur(8px);
    overflow:hidden;
  }
  .row::before{
    content:"";
    position:absolute; inset:-60px -120px;
    background:
      radial-gradient(circle at 25% 50%, rgba(25,197,255,0.25), transparent 55%),
      radial-gradient(circle at 75% 50%, rgba(255,122,24,0.18), transparent 55%);
    transform: rotate(-8deg);
    pointer-events:none;
  }

  .accent{
    position:absolute; top:50%; transform: translateY(-50%);
    width: 230px; height: 230px; border-radius: 50%;
    opacity: 0.9; pointer-events:none;
  }
  .row.orange .accent{
    left:-150px;
    background: radial-gradient(circle at 60% 50%, rgba(255,122,24,0.55), transparent 60%);
    box-shadow: var(--glow-orange);
  }
  .row.blue .accent{
    right:-150px;
    background: radial-gradient(circle at 40% 50%, rgba(25,197,255,0.60), transparent 60%);
    box-shadow: var(--glow-blue);
  }

  .team{
    width: 72%;
    font-size: 30px; font-weight: 800;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 8px 10px;
    z-index:1;
  }
  .score{
    width: 92px;
    font-size: 54px; font-weight: 900;
    text-align:center;
    z-index:1;
    padding: 2px 6px;
    border-radius: 14px;
  }
  .row.orange .score{ color: var(--wcrt-orange); text-shadow: 0 0 10px rgba(255,122,24,0.45); }
  .row.blue .score{ color: var(--wcrt-blue); text-shadow: 0 0 10px rgba(25,197,255,0.45); }

  .divider{
    height: 1px; margin: 16px auto 0 auto; width: 92%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
  }

  /* hide tiny status */
  .status{
    position:fixed; left:-9999px; top:-9999px;
  }
</style>
</head>

<body>
  <div class="container">
    <div class="bestof">
      <span>BEST OF</span>
      <div id="bo" class="bo">5</div>
    </div>

    <div class="row orange">
      <div class="accent"></div>
      <div id="t1" class="team">TEAM ONE</div>
      <div id="s1" class="score">0</div>
    </div>

    <div class="row blue">
      <div class="accent"></div>
      <div id="t2" class="team">TEAM TWO</div>
      <div id="s2" class="score">0</div>
    </div>

    <div class="divider"></div>
  </div>

  <div class="status" id="status"></div>

<script>
  // 🔧 Point this to wherever you host the JSON file:
  const DATA_URL = "./wcrt-scoreboard.json";

  async function pull() {
    try {
      // cache-bust so OBS always gets latest
      const res = await fetch(DATA_URL + "?t=" + Date.now(), { cache: "no-store" });
      const data = await res.json();

      if (data.bo !== undefined) document.getElementById("bo").textContent = data.bo;
      if (data.t1 !== undefined) document.getElementById("t1").textContent = data.t1;
      if (data.t2 !== undefined) document.getElementById("t2").textContent = data.t2;
      if (data.s1 !== undefined) document.getElementById("s1").textContent = data.s1;
      if (data.s2 !== undefined) document.getElementById("s2").textContent = data.s2;

      document.getElementById("status").textContent = "ok";
    } catch (e) {
      document.getElementById("status").textContent = "err";
    }
  }

  pull();
  setInterval(pull, 1000); // ✅ updates every second in OBS
</script>

</body>
</html>
